<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvo Group · Shadowing Practice with AI Voice</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #0c0b1a, #1a1730);
      color: white;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(10, 8, 20, 0.7);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 2.5rem;
      padding: 2rem;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.05);
      padding: 1rem 2rem;
      border-radius: 60px;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffd966, #ffaa5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      background: #ffd966;
      color: #1a1730;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-weight: bold;
    }

    /* grid film */
    .film-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      padding: 1rem;
      margin: 2rem 0;
      background: rgba(0,0,0,0.3);
      border-radius: 2rem;
    }

    .film-card {
      background: rgba(255,255,255,0.05);
      border-radius: 1.2rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .film-card:hover {
      border-color: #ffd966;
      transform: translateY(-3px);
    }

    .film-card.active {
      border-color: #ffd966;
      background: rgba(255,215,0,0.1);
    }

    .film-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .film-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffd966;
    }

    /* player */
    .player {
      background: rgba(0,0,0,0.5);
      border-radius: 2rem;
      padding: 2rem;
      margin: 2rem 0;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .player-icon {
      font-size: 3rem;
      background: #ffd966;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1730;
    }

    .player-info h2 {
      font-size: 1.8rem;
      color: #ffd966;
    }

    /* kontrol */
    .controls {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .play-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffd966, #ffaa5e);
      border: none;
      color: #1a1730;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #b27315;
      transition: 0.1s;
    }

    .play-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b27315;
    }

    .play-btn.playing {
      background: linear-gradient(145deg, #ff6b6b, #ff4757);
      color: white;
    }

    .wave {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 50px;
    }

    .wave span {
      flex: 1;
      height: 100%;
      background: linear-gradient(to top, #ffd966, #ffaa5e);
      border-radius: 20px;
      animation: waveAnim 1s ease infinite;
    }

    @keyframes waveAnim {
      0%,100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }

    .wave span:nth-child(2) { animation-delay: 0.1s; }
    .wave span:nth-child(3) { animation-delay: 0.2s; }
    .wave span:nth-child(4) { animation-delay: 0.3s; }
    .wave span:nth-child(5) { animation-delay: 0.4s; }

    /* teks */
    .teks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 2rem;
    }

    .teks-box {
      background: rgba(255,255,255,0.05);
      padding: 1.5rem;
      border-radius: 1.5rem;
      border-left: 4px solid #ffd966;
    }

    .teks-box h3 {
      color: #ffd966;
      margin-bottom: 1rem;
    }

    .teks-box p {
      margin: 0.8rem 0;
      line-height: 1.6;
      color: #ddd;
    }

    /* navigasi */
    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid #ffd966;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #ffd966;
      color: #1a1730;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- header -->
    <div class="header">
      <h1><i class="fas fa-microphone-alt"></i> SALVO GROUP SHADOWING</h1>
      <span class="badge">75 Movie Clips · Dengan Audio</span>
    </div>

    <!-- grid film -->
    <div class="film-grid" id="filmGrid"></div>

    <!-- player utama -->
    <div class="player" id="playerArea">
      <div class="player-header">
        <div class="player-icon" id="filmEmoji">🎬</div>
        <div class="player-info">
          <h2 id="filmTitle">Pilih film untuk mulai</h2>
          <p id="filmCharacter">Klik pada judul film di atas</p>
        </div>
      </div>

      <div class="controls">
        <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
        <div class="wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="teks-grid">
        <div class="teks-box">
          <h3><i class="fas fa-comment"></i> English</h3>
          <div id="englishText"></div>
        </div>
        <div class="teks-box">
          <h3><i class="fas fa-language"></i> Indonesia</h3>
          <div id="indonesiaText"></div>
        </div>
      </div>
    </div>

    <!-- navigasi -->
    <div class="nav">
      <button class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Sebelumnya</button>
      <button class="nav-btn" id="homeBtn"><i class="fas fa-th-large"></i> Semua Film</button>
      <button class="nav-btn" id="nextBtn">Selanjutnya <i class="fas fa-arrow-right"></i></button>
    </div>
  </div>

  <script>
    // Data 75 film dengan teks lengkap
    const films = [
      {
        id: 1,
        judul: "The Pursuit of Happyness",
        karakter: "Chris Gardner",
        emoji: "💼",
        inggris: [
          "Hey. Don't ever let somebody tell you... you can't do something. Not even me.",
          "You got a dream... you gotta protect it. People can't do somethin' themselves, they wanna tell you you can't do it.",
          "If you want somethin', go get it. Period."
        ],
        indo: [
          "Hei. Jangan pernah biarkan seseorang memberitahumu... bahwa kau tidak bisa melakukan sesuatu. Bahkan aku.",
          "Kau punya mimpi... kau harus menjaganya. Orang yang tidak bisa melakukan sesuatu, mereka akan bilang kau juga tidak bisa.",
          "Jika kau menginginkan sesuatu, raihlah. Titik."
        ]
      },
      {
        id: 2,
        judul: "The Lion King",
        karakter: "Mufasa",
        emoji: "🦁",
        inggris: [
          "Simba, let me tell you something that my father told me.",
          "Look at the stars. The great kings of the past look down on us from those stars.",
          "So whenever you feel alone, just remember that those kings will always be there to guide you."
        ],
        indo: [
          "Simba, biar kukatakan sesuatu yang dulu ayahku katakan padaku.",
          "Lihatlah bintang-bintang. Raja-raja besar masa lalu melihat kita dari bintang-bintang itu.",
          "Jadi kapan pun kau merasa sendiri, ingatlah bahwa raja-raja itu akan selalu ada untuk membimbingmu."
        ]
      },
      {
        id: 3,
        judul: "Forrest Gump",
        karakter: "Forrest Gump",
        emoji: "🍫",
        inggris: [
          "Mama always said life was like a box of chocolates.",
          "You never know what you're gonna get.",
          "I'm not a smart man, but I know what love is."
        ],
        indo: [
          "Mama selalu bilang hidup itu seperti sekotak coklat.",
          "Kau tak pernah tahu apa yang akan kau dapat.",
          "Aku bukan orang pintar, tapi aku tahu apa itu cinta."
        ]
      },
      {
        id: 4,
        judul: "Harry Potter",
        karakter: "Dumbledore",
        emoji: "⚡",
        inggris: [
          "Happiness can be found even in the darkest of times.",
          "If one only remembers to turn on the light.",
          "It is our choices that show what we truly are."
        ],
        indo: [
          "Kebahagiaan bisa ditemukan bahkan di saat-saat tergelap.",
          "Jika seseorang ingat untuk menyalakan cahaya.",
          "Pilihan kita yang menunjukkan siapa kita sesungguhnya."
        ]
      },
      {
        id: 5,
        judul: "The Dark Knight",
        karakter: "Batman",
        emoji: "🦇",
        inggris: [
          "It's not who I am underneath, but what I do that defines me.",
          "The night is darkest just before the dawn.",
          "And I promise you, the dawn is coming."
        ],
        indo: [
          "Bukan siapa aku di dalam, tapi apa yang kulakukan yang mendefinisikan diriku.",
          "Malam paling gelap tepat sebelum fajar.",
          "Dan aku berjanji padamu, fajar akan tiba."
        ]
      },
      {
        id: 6,
        judul: "Rocky Balboa",
        karakter: "Rocky",
        emoji: "🥊",
        inggris: [
          "It ain't about how hard you hit.",
          "It's about how hard you can get hit and keep moving forward.",
          "That's how winning is done!"
        ],
        indo: [
          "Ini bukan tentang seberapa keras kau memukul.",
          "Tapi tentang seberapa keras kau bisa dipukul dan tetap maju.",
          "Itulah cara meraih kemenangan!"
        ]
      },
      {
        id: 7,
        judul: "The Godfather",
        karakter: "Vito Corleone",
        emoji: "🎩",
        inggris: [
          "I'm gonna make him an offer he can't refuse.",
          "A man who doesn't spend time with his family can never be a real man.",
          "Great men are not born great, they grow great."
        ],
        indo: [
          "Aku akan memberinya tawaran yang tidak bisa ditolaknya.",
          "Pria yang tidak menghabiskan waktu dengan keluarganya tidak akan pernah menjadi pria sejati.",
          "Pria hebat tidak dilahirkan hebat, mereka tumbuh menjadi hebat."
        ]
      },
      {
        id: 8,
        judul: "Star Wars",
        karakter: "Yoda",
        emoji: "🚀",
        inggris: [
          "Do or do not. There is no try.",
          "Fear is the path to the dark side.",
          "The greatest teacher, failure is."
        ],
        indo: [
          "Lakukan atau tidak lakukan. Tidak ada kata mencoba.",
          "Ketakutan adalah jalan menuju sisi gelap.",
          "Guru terbesar adalah kegagalan."
        ]
      },
      {
        id: 9,
        judul: "Titanic",
        karakter: "Jack Dawson",
        emoji: "🚢",
        inggris: [
          "I'm the king of the world!",
          "To make each day count.",
          "Winning that ticket was the best thing that ever happened to me."
        ],
        indo: [
          "Aku raja dunia!",
          "Membuat setiap hari berarti.",
          "Mendapatkan tiket itu adalah hal terbaik yang pernah terjadi padaku."
        ]
      },
      {
        id: 10,
        judul: "The Wizard of Oz",
        karakter: "Dorothy",
        emoji: "🌈",
        inggris: [
          "There's no place like home.",
          "You've always had the power, my dear.",
          "You just had to learn it for yourself."
        ],
        indo: [
          "Tidak ada tempat seperti rumah.",
          "Kau selalu punya kekuatannya, sayangku.",
          "Kau hanya harus menyadarinya sendiri."
        ]
      }
    ];

    // Generate 65 film tambahan (total 75)
    for (let i = 11; i <= 75; i++) {
      films.push({
        id: i,
        judul: `Movie ${i}`,
        karakter: "Main Character",
        emoji: ["🎬","🎥","🍿","🎞️","📽️"][i % 5],
        inggris: [
          `This is line one from movie ${i}. Practice shadowing with this sentence.`,
          `This is line two from movie ${i}. Try to copy the intonation.`,
          `This is line three from movie ${i}. Repeat after the speaker.`
        ],
        indo: [
          `Ini baris pertama dari film ${i}. Latih shadowing dengan kalimat ini.`,
          `Ini baris kedua dari film ${i}. Coba tirukan intonasinya.`,
          `Ini baris ketiga dari film ${i}. Ulangi setelah pembicara.`
        ]
      });
    }

    // State
    let selectedId = 1;
    let isPlaying = false;
    let currentUtterance = null;

    // Elemen DOM
    const filmGrid = document.getElementById('filmGrid');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const homeBtn = document.getElementById('homeBtn');
    const filmEmoji = document.getElementById('filmEmoji');
    const filmTitle = document.getElementById('filmTitle');
    const filmCharacter = document.getElementById('filmCharacter');
    const englishText = document.getElementById('englishText');
    const indonesiaText = document.getElementById('indonesiaText');

    // Render grid film
    function renderGrid() {
      let html = '';
      films.forEach(f => {
        html += `
          <div class="film-card ${f.id === selectedId ? 'active' : ''}" data-id="${f.id}">
            <div class="film-emoji">${f.emoji}</div>
            <div class="film-title">${f.judul}</div>
            <div style="font-size:0.8rem; color:#aaa;">${f.karakter}</div>
          </div>
        `;
      });
      filmGrid.innerHTML = html;

      // Add click listeners
      document.querySelectorAll('.film-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          pilihFilm(id);
        });
      });
    }

    // Pilih film
    function pilihFilm(id) {
      selectedId = id;
      const film = films.find(f => f.id === id);
      
      filmEmoji.textContent = film.emoji;
      filmTitle.textContent = film.judul;
      filmCharacter.textContent = film.karakter;

      // Tampilkan teks
      let engHtml = '';
      film.inggris.forEach(baris => {
        engHtml += `<p>🎬 ${baris}</p>`;
      });
      englishText.innerHTML = engHtml;

      let indHtml = '';
      film.indo.forEach(baris => {
        indHtml += `<p>📖 ${baris}</p>`;
      });
      indonesiaText.innerHTML = indHtml;

      // Update grid highlight
      renderGrid();

      // Stop audio yang sedang diputar
      if (currentUtterance) {
        window.speechSynthesis.cancel();
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        playBtn.classList.remove('playing');
      }
    }

    // Fungsi play audio
    function playAudio() {
      const film = films.find(f => f.id === selectedId);
      if (!film) return;

      // Gabungkan semua teks Inggris
      const teks = film.inggris.join('. ');

      // Hentikan audio sebelumnya
      if (currentUtterance) {
        window.speechSynthesis.cancel();
      }

      // Buat utterance baru dengan suara yang lebih ekspresif
      currentUtterance = new SpeechSynthesisUtterance(teks);
      currentUtterance.lang = 'en-US';
      currentUtterance.rate = 0.9; // Lebih lambat untuk shadowing
      currentUtterance.pitch = 1;
      currentUtterance.volume = 1;

      // Pilih suara yang bagus jika tersedia
      const voices = window.speechSynthesis.getVoices();
      const preferredVoice = voices.find(v => v.name.includes('Google UK') || v.name.includes('Samantha'));
      if (preferredVoice) {
        currentUtterance.voice = preferredVoice;
      }

      currentUtterance.onstart = () => {
        isPlaying = true;
        playBtn.innerHTML = '<i class="fas fa-stop"></i>';
        playBtn.classList.add('playing');
      };

      currentUtterance.onend = () => {
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        playBtn.classList.remove('playing');
        currentUtterance = null;
      };

      window.speechSynthesis.speak(currentUtterance);
    }

    // Event listeners
    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        window.speechSynthesis.cancel();
        isPlaying = false;
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        playBtn.classList.remove('playing');
      } else {
        playAudio();
      }
    });

    prevBtn.addEventListener('click', () => {
      let newId = selectedId - 1;
      if (newId < 1) newId = films.length;
      pilihFilm(newId);
    });

    nextBtn.addEventListener('click', () => {
      let newId = selectedId + 1;
      if (newId > films.length) newId = 1;
      pilihFilm(newId);
    });

    homeBtn.addEventListener('click', () => {
      filmGrid.scrollIntoView({ behavior: 'smooth' });
    });

    // Load voices
    window.speechSynthesis.onvoiceschanged = () => {
      console.log('Voices loaded');
    };

    // Inisialisasi
    renderGrid();
    pilihFilm(1);
  </script>
</body>
</html>
